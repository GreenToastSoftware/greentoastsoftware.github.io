<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - GreenToastSoftware</title>
    <link rel="icon" type="image/png" href="Toast_4K_icon.png">
    <link rel="shortcut icon" type="image/x-icon" href="Toast_4K_icon.ico">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth-styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="Toast_4K_icon.png" alt="Toast Icon" class="nav-logo-icon">
                <span class="logo-text">GreenToastSoftware</span>
            </a>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="about.html" class="nav-link">About</a>
                </li>
                <li class="nav-item">
                    <a href="contact.html" class="nav-link">Contact</a>
                </li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <!-- Auth Container -->
    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-card">
                <!-- Logo -->
                <div class="auth-logo">
                    <img src="Toast_4K_icon.png" alt="GreenToast">
                    <h1>GreenToast Account</h1>
                </div>

                <!-- Tab Switcher -->
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="signin">Sign In</button>
                    <button class="auth-tab" data-tab="signup">Sign Up</button>
                </div>

                <!-- Sign In Form -->
                <form id="signin-form" class="auth-form active">
                    <div class="form-group">
                        <label for="signin-email">Email</label>
                        <input type="email" id="signin-email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="signin-password">Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="signin-password" name="password" placeholder="Enter your password" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember-me">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-password" id="forgot-password-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="auth-submit-btn">
                        <span class="btn-text">Sign In</span>
                        <span class="btn-loader" style="display: none;">
                            <svg class="spinner" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" stroke-dasharray="30 60"/>
                            </svg>
                        </span>
                    </button>
                </form>

                <!-- Sign Up Form -->
                <form id="signup-form" class="auth-form">
                    <div class="form-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" name="fullName" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="signup-password" name="password" placeholder="Create a password" required minlength="8">
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar"><div class="strength-fill"></div></div>
                            <span class="strength-text">Password strength</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="signup-confirm" name="confirmPassword" placeholder="Confirm your password" required>
                            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="agree-terms" required>
                            <span class="checkmark"></span>
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                        </label>
                    </div>
                    <button type="submit" class="auth-submit-btn">
                        <span class="btn-text">Create Account</span>
                        <span class="btn-loader" style="display: none;">
                            <svg class="spinner" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" stroke-dasharray="30 60"/>
                            </svg>
                        </span>
                    </button>
                </form>

                <!-- Reset Password Form -->
                <form id="reset-form" class="auth-form">
                    <div class="form-header">
                        <h2>Reset Password</h2>
                        <p>Enter your email address and we'll send you a link to reset your password.</p>
                    </div>
                    <div class="form-group">
                        <label for="reset-email">Email</label>
                        <input type="email" id="reset-email" name="email" placeholder="your@email.com" required>
                    </div>
                    <button type="submit" class="auth-submit-btn">
                        <span class="btn-text">Send Reset Link</span>
                        <span class="btn-loader" style="display: none;">
                            <svg class="spinner" viewBox="0 0 24 24">
                                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" stroke-dasharray="30 60"/>
                            </svg>
                        </span>
                    </button>
                    <button type="button" class="back-to-login" id="back-to-login">
                        ← Back to Sign In
                    </button>
                </form>

                <!-- Messages -->
                <div id="auth-message" class="auth-message"></div>

                <!-- Divider -->
                <div class="auth-divider">
                    <span>or continue with</span>
                </div>

                <!-- Social Login -->
                <div class="social-login">
                    <button type="button" class="social-btn google" id="google-login">
                        <svg viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google
                    </button>
                    <button type="button" class="social-btn github" id="github-login">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                        </svg>
                        GitHub
                    </button>
                </div>
            </div>

            <!-- Background decoration -->
            <div class="auth-decoration">
                <div class="decoration-circle circle-1"></div>
                <div class="decoration-circle circle-2"></div>
                <div class="decoration-circle circle-3"></div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script>
        // Tab switching
        const authTabs = document.querySelectorAll('.auth-tab');
        const authForms = document.querySelectorAll('.auth-form');

        authTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.dataset.tab;
                
                authTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                authForms.forEach(form => {
                    form.classList.remove('active');
                    if (form.id === `${targetTab}-form`) {
                        form.classList.add('active');
                    }
                });

                // Hide message
                document.getElementById('auth-message').style.display = 'none';
            });
        });

        // Show reset password form
        document.getElementById('forgot-password-link').addEventListener('click', (e) => {
            e.preventDefault();
            authForms.forEach(form => form.classList.remove('active'));
            document.getElementById('reset-form').classList.add('active');
            authTabs.forEach(t => t.classList.remove('active'));
        });

        // Back to sign in
        document.getElementById('back-to-login').addEventListener('click', () => {
            authForms.forEach(form => form.classList.remove('active'));
            document.getElementById('signin-form').classList.add('active');
            authTabs[0].classList.add('active');
        });

        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = btn.previousElementSibling;
                const eyeOpen = btn.querySelector('.eye-open');
                const eyeClosed = btn.querySelector('.eye-closed');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    eyeOpen.style.display = 'none';
                    eyeClosed.style.display = 'block';
                } else {
                    input.type = 'password';
                    eyeOpen.style.display = 'block';
                    eyeClosed.style.display = 'none';
                }
            });
        });

        // Password strength indicator
        const passwordInput = document.getElementById('signup-password');
        const strengthBar = document.querySelector('.strength-fill');
        const strengthText = document.querySelector('.strength-text');

        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            let strength = 0;
            
            if (password.length >= 8) strength += 25;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength += 25;
            if (password.match(/\d/)) strength += 25;
            if (password.match(/[^a-zA-Z\d]/)) strength += 25;

            strengthBar.style.width = `${strength}%`;
            
            if (strength <= 25) {
                strengthBar.style.background = '#ef4444';
                strengthText.textContent = 'Weak';
            } else if (strength <= 50) {
                strengthBar.style.background = '#f59e0b';
                strengthText.textContent = 'Fair';
            } else if (strength <= 75) {
                strengthBar.style.background = '#3b82f6';
                strengthText.textContent = 'Good';
            } else {
                strengthBar.style.background = '#10b981';
                strengthText.textContent = 'Strong';
            }
        });

        // Show message
        function showMessage(message, type = 'info') {
            const messageEl = document.getElementById('auth-message');
            messageEl.textContent = message;
            messageEl.className = `auth-message ${type}`;
            messageEl.style.display = 'block';
            
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 5000);
        }

        // Sign In handler
        document.getElementById('signin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log('=== LOGIN FORM SUBMITTED ===');
            
            const btn = e.target.querySelector('.auth-submit-btn');
            const btnText = btn.querySelector('.btn-text');
            const btnLoader = btn.querySelector('.btn-loader');
            
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';
            btn.disabled = true;

            const email = document.getElementById('signin-email').value;
            const password = document.getElementById('signin-password').value;

            console.log('Attempting sign in with:', email);
            const result = await auth.signIn(email, password);
            console.log('Sign in result:', result);

            btnText.style.display = 'block';
            btnLoader.style.display = 'none';
            btn.disabled = false;

            if (result.success) {
                console.log('=== LOGIN SUCCESS ===');
                console.log('Session data:', result.data?.session);
                console.log('User:', result.data?.user?.email);
                
                // Test localStorage
                try {
                    localStorage.setItem('test-storage', 'works');
                    const testRead = localStorage.getItem('test-storage');
                    console.log('localStorage test:', testRead === 'works' ? 'WORKING' : 'FAILED');
                    localStorage.removeItem('test-storage');
                } catch (e) {
                    console.error('localStorage ERROR:', e);
                }
                
                showMessage('Sign in successful! Redirecting...', 'success');
                
                // Store session manually as backup
                if (result.data?.session) {
                    try {
                        const sessionData = JSON.stringify(result.data.session);
                        sessionStorage.setItem('gt-temp-session', sessionData);
                        console.log('Session saved to sessionStorage as backup');
                    } catch (e) {
                        console.error('sessionStorage error:', e);
                    }
                }
                
                // Redirect
                setTimeout(() => {
                    const storageKey = window.SUPABASE_STORAGE_KEY || 'sb-fgigiqnvrexvtmqketuh-auth-token';
                    const storedSession = localStorage.getItem(storageKey);
                    console.log('Before redirect - localStorage (' + storageKey + '):', storedSession ? 'EXISTS' : 'MISSING');
                    console.log('Before redirect - sessionStorage backup:', sessionStorage.getItem('gt-temp-session') ? 'EXISTS' : 'MISSING');
                    window.location.replace('account.html');
                }, 1500);
            } else {
                console.log('=== LOGIN FAILED ===');
                console.log('Error:', result.error);
                showMessage(result.error || 'Sign in failed. Please try again.', 'error');
            }
        });

        // Sign Up handler
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.auth-submit-btn');
            const btnText = btn.querySelector('.btn-text');
            const btnLoader = btn.querySelector('.btn-loader');

            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm').value;

            if (password !== confirmPassword) {
                showMessage('Passwords do not match!', 'error');
                return;
            }

            btnText.style.display = 'none';
            btnLoader.style.display = 'block';
            btn.disabled = true;

            const email = document.getElementById('signup-email').value;
            const fullName = document.getElementById('signup-name').value;

            const result = await auth.signUp(email, password, { fullName });

            btnText.style.display = 'block';
            btnLoader.style.display = 'none';
            btn.disabled = false;

            if (result.success) {
                showMessage(result.message || 'Account created! Please check your email.', 'success');
            } else {
                showMessage(result.error || 'Sign up failed. Please try again.', 'error');
            }
        });

        // Reset Password handler
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.auth-submit-btn');
            const btnText = btn.querySelector('.btn-text');
            const btnLoader = btn.querySelector('.btn-loader');

            btnText.style.display = 'none';
            btnLoader.style.display = 'block';
            btn.disabled = true;

            const email = document.getElementById('reset-email').value;
            const result = await auth.resetPassword(email);

            btnText.style.display = 'block';
            btnLoader.style.display = 'none';
            btn.disabled = false;

            if (result.success) {
                showMessage(result.message || 'Reset link sent!', 'success');
            } else {
                showMessage(result.error || 'Failed to send reset email.', 'error');
            }
        });

        // Social login handlers
        document.getElementById('google-login').addEventListener('click', async () => {
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: `${window.location.origin}/account.html`
                }
            });
            if (error) showMessage(error.message, 'error');
        });

        document.getElementById('github-login').addEventListener('click', async () => {
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'github',
                options: {
                    redirectTo: `${window.location.origin}/account.html`
                }
            });
            if (error) showMessage(error.message, 'error');
        });

        // Check if already logged in
        (async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            console.log('Login page session check:', session ? 'Already logged in' : 'Not logged in');
            if (session && session.user) {
                window.location.replace('account.html');
            }
        })();
    </script>
</body>
</html>

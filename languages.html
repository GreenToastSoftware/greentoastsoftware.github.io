<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenToastSoftware - Seletor de Idioma</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }

        .logo {
            margin-bottom: 30px;
        }

        .logo img {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
            color: #333;
        }

        .subtitle {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 50px;
        }

        .language-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .language-card {
            padding: 30px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            background: #f9f9f9;
        }

        .language-card:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }

        .language-card .flag {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .language-card .name {
            font-weight: 600;
            font-size: 1.1em;
            color: #333;
        }

        .language-card .native {
            font-size: 0.9em;
            color: #999;
            margin-top: 8px;
        }

        .footer {
            text-align: center;
            color: #999;
            font-size: 0.9em;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            color: #667eea;
            text-decoration: none;
            border: 2px solid #667eea;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .language-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="Toast_4K_icon.png" alt="Toast Icon" onerror="this.src='Toast_4K_icon.png'">
        </div>
        
        <h1>GreenToastSoftware</h1>
        <p class="subtitle">Selecione seu idioma preferido / Select your preferred language</p>

        <div class="language-grid">
            <a href="index.html" class="language-card">
                <div class="flag">🇬🇧</div>
                <div class="name">English</div>
                <div class="native">English</div>
            </a>
            
            <a href="ja/index.html" class="language-card">
                <div class="flag">🇯🇵</div>
                <div class="name">Japonês</div>
                <div class="native">日本語</div>
            </a>

            <a href="#" class="language-card" style="opacity: 0.5; cursor: not-allowed;">
                <div class="flag">🇵🇹</div>
                <div class="name">Português</div>
                <div class="native">Português</div>
            </a>

            <a href="#" class="language-card" style="opacity: 0.5; cursor: not-allowed;">
                <div class="flag">🇪🇸</div>
                <div class="name">Español</div>
                <div class="native">Español</div>
            </a>
        </div>

        <div class="footer">
            <p>Imagining a technological future for everyone® | © GreenToastSoftware 2020-2026</p>
        </div>
    </div>
</body>
</html>
